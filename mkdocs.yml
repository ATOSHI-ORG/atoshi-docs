site_name: Atoshi Documentation
site_description: Canonical technical documentation for the Atoshi Chain
# Must match the ACTUAL deployment base — the language switcher / alternate
# links are derived from it. This is the GitHub Pages project URL (note the
# /atoshi-docs/ path). If you later attach the custom domain docs.atoshi.org,
# change this to https://docs.atoshi.org/ .
site_url: https://atoshi-org.github.io/atoshi-docs/
repo_url: https://github.com/ATOSHI-ORG/atoshi-docs
repo_name: ATOSHI-ORG/atoshi-docs

# Content lives at the repo root (README.md, modules/, economics/, …). The
# deploy workflow assembles a copy into site_src/ at build time, so the repo
# layout stays unchanged and README.md keeps rendering on GitHub.
docs_dir: site_src

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
  - i18n:
      docs_structure: suffix          # foo.md = English (default), foo.zh.md = Chinese
      fallback_to_default: true       # pages without a .zh.md fall back to English
      reconfigure_material: true      # add the EN / 中文 header switcher automatically
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
          site_name: Atoshi 文档
          nav_translations:
            Home: 首页
            Overview: 概览
            Architecture: 架构
            High-level architecture: 整体架构
            Cosmos SDK L1 (EVM): Cosmos SDK L1（EVM）
            Polygon CDK zkEVM L2: Polygon CDK zkEVM L2
            L1 ↔ L2 bridge: L1 ↔ L2 跨层桥
            Accounts & keys: 账户与密钥
            Modules: 模块
            Energy: 能量
            Tokenomics: 代币经济
            Oracle: 预言机
            Bank: 银行（转账）
            EVM: EVM
            Bridge: 跨层桥
            Privacy: 隐私
            Staking: 质押
            Governance: 治理
            Economics: 经济模型
            Supply & circulation: 供应与流通
            Release schedule: 释放计划
            Gas & energy: Gas 与能量
            Block rewards: 区块奖励
            Burn & recycle: 销毁与回收
            Privacy deep-dive: 隐私深入
            Threat model: 威胁模型
            Shield pool: 隐私池
            ZK circuits: ZK 电路
            Energy settlement: 能量结算
            Reference: 参考
            CLI reference: CLI 命令参考
            Releases & versioning: 发布与版本
            API guide: API 指南
            Wallet integration: 钱包集成
            Node operation: 节点运维
            Governance runbook: 治理操作手册
            Glossary: 术语表
            FAQ: 常见问题

nav:
  - Home: README.md
  - Overview: 00-overview.md
  - Architecture:
      - High-level architecture: architecture/01-overview.md
      - Cosmos SDK L1 (EVM): architecture/02-cosmos-l1.md
      - Polygon CDK zkEVM L2: architecture/03-polygon-l2.md
      - L1 ↔ L2 bridge: architecture/04-bridge.md
      - Accounts & keys: architecture/05-accounts.md
  - Modules:
      - Energy: modules/01-energy.md
      - Tokenomics: modules/02-tokenomics.md
      - Oracle: modules/03-oracle.md
      - Bank: modules/04-bank.md
      - EVM: modules/05-evm.md
      - Bridge: modules/06-bridge.md
      - Privacy: modules/07-privacy.md
      - Staking: modules/08-staking.md
      - Governance: modules/09-governance.md
  - Economics:
      - Supply & circulation: economics/01-supply.md
      - Release schedule: economics/02-release-schedule.md
      - Gas & energy: economics/03-gas-fee.md
      - Block rewards: economics/04-block-rewards.md
      - Burn & recycle: economics/05-burn-recycle.md
  - Privacy deep-dive:
      - Threat model: privacy/01-threat-model.md
      - Shield pool: privacy/02-shield-pool.md
      - ZK circuits: privacy/03-zk-circuits.md
      - Energy settlement: privacy/04-energy-settlement.md
  - Reference:
      - CLI reference: reference/cli.md
      - Releases & versioning: reference/releases.md
      - API guide: reference/api-guide.md
      - Wallet integration: reference/wallet-integration.md
      - Node operation: reference/node-operation.md
      - Governance runbook: reference/governance-runbook.md
      - Glossary: reference/glossary.md
      - FAQ: reference/faq.md
