name: Deploy docs

# Build the MkDocs site and publish it to GitHub Pages on every push to main.
# One-time setup in the repo: Settings → Pages → Build and deployment →
# Source = "GitHub Actions". (Optional) set a custom domain there, e.g.
# docs.atoshi.org, and add a DNS CNAME: docs.atoshi.org → atoshi-org.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install "mkdocs-material>=9.5" "mkdocs-static-i18n>=1.2"

      - name: Assemble docs sources
        run: |
          rm -rf site_src
          mkdir -p site_src
          cp README*.md site_src/          # README.md (home) + README.zh.md if present
          cp 00-overview*.md site_src/      # English + .zh.md translations
          cp -r architecture economics modules privacy reference assets site_src/

      - name: Build site
        run: mkdocs build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
